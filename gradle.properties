# 🚀 Cloud Build အတွက် Memory (RAM) ကို 4GB အထိ တိုးမြှင့်ပေးခြင်း
org.gradle.jvmargs=-Xmx4096m -XX:MaxMetaspaceSize=1024m

# Daemon ကြောင့် Memory ထပ်မကုန်စေရန် ပိတ်ထားခြင်း
org.gradle.daemon=false

# Jetpack Compose အတွက် AndroidX စနစ်ကို အသုံးပြုခွင့်ပေးခြင်း
android.useAndroidX=true
android.enableJetifier=true
