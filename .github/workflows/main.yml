name: Generate Android Tool Scripts Locally

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  generate-tools:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Create Assets Directory
        run: mkdir -p app/src/main/assets/bin_tools

      - name: Write Local Native Engine Shell Wrappers
        run: |
          cd app/src/main/assets/bin_tools/
          
          # အင်တာနက်ကနေ ဘာမှမဒေါင်းပါ (curl မသုံးပါ)
          echo -e '#!/bin/sh\nif [ -f "/system/bin/aapt2" ]; then\n    exec /system/bin/aapt2 "$@"\nelse\n    exec aapt2 "$@"\nfi' > aapt2
          echo -e '#!/bin/sh\nexec dalvikvm -Xmx256m -cp "$0.jar" com.android.tools.r8.D8 "$@"' > d8
          echo -e '#!/bin/sh\nexec dalvikvm -Xmx256m -cp "$0.jar" com.android.apksigner.Apksigner "$@"' > apksigner
          echo -e '#!/bin/sh\nexec dalvikvm -Xmx128m -cp "$0.jar" sun.security.tools.keytool.Main "$@"' > keytool

          chmod +x aapt2 d8 apksigner keytool

      - name: Commit and Push Pure Scripts back to GitHub
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add app/src/main/assets/bin_tools/*
          git diff-index --quiet HEAD || git commit -m "Automated Build: Pure Tooling Scripts Injected Locally"
          git push
