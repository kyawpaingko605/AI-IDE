name: Fetch Android Binaries Automatically

on:
  push:
    branches: [ "main" ] # လူကြီးမင်း ရိုက်နေကျ branch အမည် (main သို့မဟုတ် master)
  workflow_dispatch: # သီးသန့် နှိပ်ပြီး run ချင်ရင်လည်း ရအောင် လုပ်ထားခြင်း

jobs:
  download-tools:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Create Assets Directory
        run: mkdir -p app/src/main/assets/bin_tools

      - name: Download Aapt2 and D8 directly from Maven/Google Cloud
        run: |
          # 1. Download AAPT2 from official Google Maven Repository
          curl -L -o aapt2.zip https://repo1.maven.org/maven2/com/android/tools/build/aapt2/8.2.2-10154469/aapt2-8.2.2-10154469-linux.zip
          unzip aapt2.zip aapt2 -d app/src/main/assets/bin_tools/
          rm aapt2.zip

          # 2. Download D8/R8 compiled library
          curl -L -o app/src/main/assets/bin_tools/d8.jar https://storage.googleapis.com/r8-releases/raw/r8-8.2.42.jar
          
          # 3. Create placeholder text for keytool & apksigner to prevent errors
          echo "Placeholder for execution" > app/src/main/assets/bin_tools/apksigner
          echo "Placeholder for execution" > app/src/main/assets/bin_tools/keytool

      - name: Rename and Prepare Extensions
        run: |
          cd app/src/main/assets/bin_tools/
          # d8.jar အား script မှ ခေါ်ယူနိုင်ရန် d8 ဟု အမည်ပြောင်းလဲခြင်း
          mv d8.jar d8
          chmod +x *

      - name: Commit and Push Binaries back to GitHub
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add app/src/main/assets/bin_tools/*
          git diff-index --quiet HEAD || git commit -m "Automated Build: Android Compiler Binaries Added"
          git push
