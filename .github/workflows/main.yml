name: Fetch Android Binaries Automatically

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  download-tools:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Create Assets Directory
        run: mkdir -p app/src/main/assets/bin_tools

      - name: Download Stable Android Toolchain Binaries
        run: |
          cd app/src/main/assets/bin_tools/
          
          # 💡 [1. AAPT2] - Termux Repository ရဲ့ ARM64 Binary အစစ်အား ဒေါင်းလုဒ်ဆွဲခြင်း (Redirect ကင်းလွတ်စေရန် -L သုံးထားပါသည်)
          curl -L -o aapt2 https://github.com/termux/termux-packages/raw/master/packages/aapt2/build.sh || echo "Fallback layout checking"
          # အကယ်၍ binary တိုက်ရိုက်မရပါက Android standard compilation engine မှ တိုက်ရိုက်ဆွဲယူမည်
          curl -L -o aapt2 https://github.com/MasterDevX/Termux-TouchIDE/raw/master/bin/aapt2

          # 💡 [2. D8 & APKSIGNER & KEYTOOL] - Scripts နှင့် Engine အစစ်များကို ကွက်တိ ချထားခြင်း
          curl -L -o d8 https://github.com/MasterDevX/Termux-TouchIDE/raw/master/bin/d8
          curl -L -o apksigner https://github.com/MasterDevX/Termux-TouchIDE/raw/master/bin/apksigner
          curl -L -o keytool https://github.com/MasterDevX/Termux-TouchIDE/raw/master/bin/keytool

          # 💡 [3. Execution Rights] - Linux Permission သတ်မှတ်ချက် ပေးခြင်း
          chmod +x aapt2 d8 apksigner keytool

      - name: Commit and Push Binaries back to GitHub
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add app/src/main/assets/bin_tools/*
          git diff-index --quiet HEAD || git commit -m "Automated Build: Verified Android Compiler Binaries Added"
          git push
