name: Android CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    # 🛠️ gradlew ဖိုင်မရှိပါက အလိုအလျောက် Setup ပြန်ဆောက်ပေးမည့်အဆင့် (Error ပြင်ဆင်ချက်)
    - name: Setup Gradle Wrapper if missing
      run: |
        if [ ! -f "gradlew" ]; then
          gradle wrapper --gradle-version 8.4
        fi

    - name: Grant Execute Permission for Gradle
      run: chmod +x gradlew

    - name: Run Build and Test with Gradle
      run: ./gradlew build
